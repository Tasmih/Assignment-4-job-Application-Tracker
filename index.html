<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Track Dashboard</title>
        <link rel="shortcut icon" href="./image/jobs.png" type="image/x-icon">
    <!-- tailwind + daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
         font-family: "Outfit", sans-serif;
    }
    .job-card:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
</style>

</head>
<body class="bg-slate-50">
    <section id="header-section" class="w-[80%] mx-auto">
        <div class="pt-[60px]">
            <h1 class="text-2xl sm:text-center md:text-left font-bold text-black">Job Application Tracker</h1>
           
             <div class="flex sm:flex-col sm:items-center  md:flex-row gap-3 pt-5 pb-8 justify-between">
                <div class="bg-white p-5 w-[370px] rounded-xl ">
                    <p class="text-gray-900">Total</p>
                    <p id="total">0</p>
                </div>
                <div class="bg-white p-5 w-[370px] rounded-xl ">
                    <p class="text-gray-900">Interview</p>
                    <p id="interviewCount" class="text-green-700">0</p>
                </div>
                <div class="bg-white p-5 w-[370px] rounded-xl ">
                    <p class="text-gray-900">Rejected</p>
                    <p id="rejectCount" class="text-red-700">0</p>
                </div>
            </div>
              
        </div>
        
    </section>

     <hr class="my-5 bg-gray-200">
      <!-- Main Section -->
    <main class="w-[80%] mx-auto pb-[60px]">

        <!-- Summary / Filters -->
        <div id="summary" class="">
            <div class="flex justify-between pb-6">
                <p>Available Jobs</p>
                <p id="available-count">8 Jobs</p>
            </div>

            <div class="flex sm:mx-auto gap-2 pb-4">
                <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="px-3 py-2 bg-blue-500 text-white rounded-md w-[80px]">All</button>
                <button onclick="toggleStyle('interview-filter-btn')" id="interview-filter-btn" class="px-3 py-2 bg-white text-slate-500 rounded-md w-[80px]">Interview</button>
                <button onclick="toggleStyle('reject-filter-btn')" id="reject-filter-btn" class="px-3 py-2 bg-white text-slate-500 rounded-md w-[80px]">Rejected</button>
            </div>

            <!-- Filtered Cards Section -->
            <section id="filtered-section" class="hidden"></section>
        </div>

        <!-- No Jobs Section -->
        <div id="no-jobs" class="hidden flex flex-col items-center bg-white rounded-md mb-4 py-[110px] space-y-4">
            <img src="./image/jobs.png" alt="">
            <div class="flex flex-col items-center">
                <p class="text-sky-950 font-bold">No jobs available</p>
                <p class="text-slate-500">Check back soon for new job opportunities</p>
            </div>
        </div>

        <!-- All Cards Section -->
        <div id="allCards" class="space-y-6">

            <!-- Example Job Card -->
            <div class="jobCard bg-white p-6 flex justify-between items-start rounded-xl shadow border border-gray-200">

                <!-- Left Side -->
                <div class="flex-1 space-y-3">
                    <div>
                        <p class="companyName text-blue-950 font-bold">Mobile First Corp</p>
                        <p class="jobName text-slate-500">React Native Developer</p>
                    </div>

                    <p class="jobCriteria text-slate-500">Remote . Full-time . $130,000 - $175,000</p>

                    <button class="statusBadge bg-blue-50 py-3 px-4 text-blue-950 rounded-md inline-block">
                        NOT APPLIED
                    </button>

                    <p class="notes text-slate-500">
                        Build cross-platform mobile applications using React Native.
                    </p>

                    <div class="flex gap-3 mt-4">
                        <button class="interview bg-white py-3 px-6 text-emerald-500 rounded-md border border-green-600">
                            Interview
                        </button>
                        <button class="reject bg-white py-3 px-6 text-red-500 rounded-md border border-red-600">
                            Rejected
                        </button>
                    </div>
                </div>

                <!-- Right Side -->
                <div class="ml-4">
                    <button class="delete-btn">
                        <img src="./image/btn-delete.png" alt="">
                    </button>
                </div>

            </div>
            

        </div>
