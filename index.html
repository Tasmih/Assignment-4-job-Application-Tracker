<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Track Dashboard</title>
        <link rel="shortcut icon" href="./images/jobs.png" type="image/x-icon">
    <!-- tailwind + daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
         font-family: "Outfit", sans-serif;
    }
    .job-card:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
</style>

</head>
<body class="bg-slate-50">
    <section id="header-section" class="w-[80%] mx-auto">
        <div class="pt-[60px]">
            <h1 class="text-2xl sm:text-center md:text-left font-bold text-black">Job Application Tracker</h1>
           
             <div class="flex sm:flex-col sm:items-center  md:flex-row gap-3 pt-5 pb-8 justify-between">
                <div class="bg-white p-5 w-[370px] rounded-xl ">
                    <p class="text-gray-900">Total</p>
                    <p id="total">0</p>
                </div>
                <div class="bg-white p-5 w-[370px] rounded-xl ">
                    <p class="text-gray-900">Interview</p>
                    <p id="interviewCount" class="text-green-700">0</p>
                </div>
                <div class="bg-white p-5 w-[370px] rounded-xl ">
                    <p class="text-gray-900">Rejected</p>
                    <p id="rejectCount" class="text-red-700">0</p>
                </div>
            </div>
              
        </div>
        
    </section>

     <hr class="my-5 bg-gray-200">
